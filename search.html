---
layout: default
title: Search
---

<h1>Search the epigraphic corpus</h1>

<input type="text" id="searchBox" placeholder="Scrivi: Roma, marmo, Felix..." style="width:100%; padding:10px; font-size:16px;">

<p id="resultCount" style="margin:10px 0; font-weight:bold;"></p>

<ul id="results"></ul>

<script>
fetch('{{ "/epigraphy.json" | relative_url }}')
  .then(res => res.json())
  .then(data => {

    const resultsBox = document.getElementById('results')

    function render(list) {
      resultsBox.innerHTML = ''

      list.forEach(item => {
        const li = document.createElement('li')

        li.innerHTML = `
          <a href="${item.url}"><strong>${item.title}</strong></a><br>
          ${item.provenance || ''} | ${item.material || ''} | ${item.date || ''}
        `

        resultsBox.appendChild(li)
      })
    }

    // mostra tutto all'inizio
    render(data)

    document.getElementById('searchBox').addEventListener('input', function () {
      const q = this.value.toLowerCase().trim()

      if (q === '') {
        render(data)
        return
      }

      const filtered = data.filter(item =>
        (item.title || '').toLowerCase().includes(q) ||
        (item.provenance || '').toLowerCase().includes(q) ||
        (item.material || '').toLowerCase().includes(q) ||
        (item.findspot || '').toLowerCase().includes(q) ||
        (item.language || '').toLowerCase().includes(q) ||
        (item.type || '').toLowerCase().includes(q) ||
        (item.date || '').toLowerCase().includes(q) ||
        (item.text || '').toLowerCase().includes(q)
      )

      render(filtered)

      // Mostra conteggio risultati
      const count = document.getElementById('resultCount')
      count.textContent = 
      `${filtered.length} result${filtered.length > 1 ? 's' : ''}`
    })

  })
</script>

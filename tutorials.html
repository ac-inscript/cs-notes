<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials</title>
    <style>
        body {
            margin: 0;
            font-family: 'Tahoma', Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #ffffff;
        }
        .page {
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            position: relative;
        }
        .hero {
            background: #c20000;
            padding: 32px 28px;
            border-bottom: 1px solid #ffffff;
            position: relative;
        }
        .hero img {
            position: absolute;
            top: 0;
            right: 0;
            padding: 10px;
        }
        .hero h1 {
            margin: 0 0 12px;
            font-size: 2.4rem;
            color: #ffffff;
            font-weight: bold;
        }
        .content {
            padding: 32px 28px;
        }
        .section {
            margin-bottom: 28px;
            text-align: center;
        }
        .section h2 {
            margin: 0 0 12px;
            font-size: 1.4rem;
            color: #c20000;
        }
        .section p {
            margin: 0 8px 14px;
            color: #000000;
            line-height: 1.7;
        }
        .section iframe {
            margin: 0 auto 14px;
            border: 1px solid #c20000;
            border-radius: 8px;
            max-width: 100%;
            display: block;
            position: static;
            left: auto;
            transform: none;
        }
        footer {
            padding: 24px 28px;
            background: #810000;
            color:#ffffff;
            font-size: 0.95rem;
        }
        </style>
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="hero">
                <h1>Tutorials: Wikidata Collection</h1>
                <h2>Digital Epigraphy Series</h2>
            </header>
            <main class="content">
                    <section class="section">
                    <h2>Episode 1: What is Wikidata?</h2>
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/vhnM6J5Sd2s?si=PE-6gMbyKuZfdid7" title="Episode 1: What is Wikidata?" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </section>
                <section class="section">
                    <h2>Episode 2: Why Wikidata matters for Epigraphy</h2>
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/0vh2MNOHIuU?si=29ZeOqY_AJmSk4cX" title="Episode 2: Why Wikidata matters for Epigraphy" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </section>
                <section class="section">
                    <p>New episodes coming soon!</p>
                </section>
            </main>
            <footer>
                <a href="index.html">Back to Index</a>
            </footer>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials</title>
    <style>
        body {
            margin: 0;
            font-family: 'Tahoma', Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #ffffff;
        }
        .page {
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #c20000;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .hero {
            background: #c20000;
            padding: 32px 28px;
            border-bottom: 1px solid #ffffff;
            position: relative;
        }
        .hero img {
            position: absolute;
            top: 0;
            right: 0;
            padding: 10px;
        }
        .hero h1 {
            margin: 0 0 12px;
            font-size: 2.4rem;
            color: #ffffff;
            font-weight: bold;
        }
        .content {
            padding: 32px 28px;
        }
        .section {
            margin-bottom: 28px;
        }
        .section h2 {
            margin: 0 0 12px;
            font-size: 1.4rem;
            color: #810000;
        }
        .section p {
            margin: 0 8px 14px;
            color: #000000;
            line-height: 1.7;
        }
        .links {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .links li {
            margin-bottom: 10px;
        }
        .links a {
            display: inline-block;
            text-decoration: none;
            color: #1a1a1a;
            border: 2px solid #000000;
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .links a:hover {
            background: #eb8f8f;
            transform: translateX(2px);
        }
        footer {
            padding: 24px 28px;
            background: #810000;
            color:#ffffff;
            font-size: 0.95rem;
        }
        </style>
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="hero">
                <h1>Tutorials: Wikidata Collection</h1>
                <h2>Digital Epigraphy Series</h2>
            </header>
            <main class="content">
                <section class="section">
                    <iframe width="560" height="315" 
                    src="https://www.youtube.com/watch?v=vhnM6J5Sd2s&t=43s" 
                    title="Episode 1: What is Wikidata?" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                    </iframe>
                </section>
            </main>
            <footer>
                <a href="index.html"></a>Back to Index</a>
            </footer>
        </div>
    </div>
</body>
</html>

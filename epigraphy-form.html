<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Epigraphic Record Generator</title>

  <style>
    body {
      font-family: "Times New Roman", serif;
      max-width: 800px;
      margin: 20px auto;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
    }

    textarea {
      height: 80px;
    }

    pre {
      background: #840c0c;
      color: #fff;
      padding: 10px;
    }
  </style>
</head>

<body>

  <h1>Epigraphic Record Generator</h1>

  <label>Type of inscription</label>
  <input id="type_inscription">

  <label>Type of object</label>
  <input id="type_object">

  <label>Location of creation</label>
  <input id="place_creation">

  <label>Location of discovery</label>
  <input id="place_discovery">

  <label>Chronology</label>
  <input id="chronology">

  <label>Collection</label>
  <input id="collection">

  <label>Material</label>
  <input id="material">

  <label>Language</label>
  <input id="language">

  <label>Layout / Record</label>
  <textarea id="record"></textarea>

  <button onclick="generate()">Generate record</button>

  <h2>Output (Markdown)</h2>
  <pre id="output"></pre>

  <script>
    function generate() {
      const title = document.getElementById("title").value;
      const type_inscription = document.getElementById("type_inscription").value;
      const type_object = document.getElementById("type_object").value;
      const place_creation = document.getElementById("place_creation").value;
      const place_discovery = document.getElementById("place_discovery").value;
      const chronology = document.getElementById("chronology").value;
      const collection = document.getElementById("collection").value;
      const material = document.getElementById("material").value;
      const language = document.getElementById("language").value;
      const record = document.getElementById("record").value;

      const result = 
`
---
title: ${title}
type of inscription: ${type_inscription}
layout: ${record}
material: ${material}
provenance: ${place_creation}
findspot: ${place_discovery}
chronology: ${chronology}
language: ${language}
collection: ${collection}
type: ${type_object}
---
`;

      document.getElementById("output").innerText = result;
    }
  </script>

</body>
</html>

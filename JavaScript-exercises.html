<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - CS Notes</title>
    <style>
        body {
            margin: 0;
            font-family: 'Tahoma', Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #000000;
        }
        .page {
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #8994e5;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .hero {
            background: #8994e5;
            padding: 32px 28px;
            border-bottom: 1px solid #ffffff;
            position: relative;
        }
        .hero img {
            position: absolute;
            top: 0;
            right: 0;
            padding: 7px;
        }
        .hero h1 {
            margin: 0 0 12px;
            font-size: 2.4rem;
            color: #ffffff;
            font-weight: bold;
        }
        .content {
            padding: 32px 28px;
        }
        .section {
            margin-bottom: 28px
        }
        .section p {
            margin: 0 8px 14px;
            color: #000000;
            line-height: 1.7;
        }
        .links {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .links li {
            margin-bottom: 10px;
        }
        .links a {
            display: inline-block;
            text-decoration: none;
            color: #1a1a1a;
            border: 1px solid #8994e5;
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .links a:hover {
            background: #eb8f8f;
            transform: translateX(2px);
        }
        footer {
            padding: 24px 28px;
            background: #8994e5;
            color:#ffffff;
            font-size: 0.95rem;
        }
    </style>
</head> 
<body>
    <div class="page">
        <div class="container">
            <header class="hero">
                <h1>My exercises</h1>
                <h2>JavaScript</h2>
                <img src="Grace on rainbow.jpg" alt="Grace on rainbow" style="width: 300px; height: auto;"><br>
            </header>
            <main class="content">
                <section class="section">
                    <h1>Mixing colours</h1>
                    <p>Insert the hex code without # and click on 'Mix'.</p>
                    <input id="c1" type="text" placeholder="Colour 1 (e.g., FF0000)">
                    <input id="c2" type="text" placeholder="Colour 2 (e.g., 00FF00)">
                    <button id="mixButton">Mix</button>
                    <div id="result" style="margin-top:20px;"></div>
                </section>
            </main>
        </div>
    </div>
    <script>
        function mix(hex1, hex2) {
            const c1 = parseInt(hex1, 16);
            const c2 = parseInt(hex2, 16);
            const r = ((c1 >> 16) + (c2 >> 16)) >> 1;
            const g = (((c1 >> 8) & 0xFF) + ((c2 >> 8) & 0xFF)) >> 1;
            const b = ((c1 & 0xFF) + (c2 & 0xFF)) >> 1;
            return (
                "#" +
                r.toString(16).padStart(2, "0") +
                g.toString(16).padStart(2, "0") +
                b.toString(16).padStart(2, "0")
            );
        }

        function showMix() {
            const hex1 = document.getElementById("c1").value.trim();
            const hex2 = document.getElementById("c2").value.trim();
            const result = mix(hex1, hex2);
            document.getElementById("result").innerHTML = `
                <p>Resulting colour: <strong>${result}</strong></p>
                <div style="width:100px; height:50px; background:${result}; border:1px solid #000;"></div>
            `;
        }
        document.getElementById("mixButton").addEventListener("click", showMix);
    </script>
                <footer>
                <a href="my-exercises.html" style="color: #0073d7; text-decoration: underline;">Back to Home</a>
            </footer>
</body>
</html>

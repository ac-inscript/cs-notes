            </header>
            <main class="content">
                <section class="section">
                    <h1>Java Script Exercises</h1>
                    <h2>Mixing colours</h2>
            <script>
                    function mix(hex1, hex2) {
  const c1 = parseInt(hex1, 16);
  const c2 = parseInt(hex2, 16);

  const r = ((c1 >> 16) + (c2 >> 16)) >> 1;
  const g = (((c1 >> 8) & 0xFF) + ((c2 >> 8) & 0xFF)) >> 1;
  const b = ((c1 & 0xFF) + (c2 & 0xFF)) >> 1;

  return (
    "#" +
    r.toString(16).padStart(2, "0") +
    g.toString(16).padStart(2, "0") +
    b.toString(16).padStart(2, "0")
  );
}
console.log(mix("FF0000", "00FF00")); // → #808000 (giallo oliva)
</script>

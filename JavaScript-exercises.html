<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - CS Notes</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto Condensed', Roboto;
            background: #ffffff;
            color: #000000;
        } 
        .page {
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #8994e5;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .hero {
            background: #8994e5;
            padding: 32px 28px;
            border-bottom: 1px solid #ffffff;
            position: relative;
        }
        .hero img {
            position: absolute;
            top: 0;
            right: 0;
            padding: 7px;
        }
        .hero h1 {
            margin: 0 0 12px;
            font-size: 2.4rem;
            color: #ffffff;
            font-weight: bold;
        }
        .content {
            padding: 32px 28px;
            background: #ffffff; /
        }
        .section {
            margin-bottom: 28px;
        }
        .section p {
            margin: 0 8px 14px;
            color: #000000;
            line-height: 1.7;
        }
        .section h3 {
            margin: 0 0 12px;
            font-size: 1.4rem;
            color: #8994e5;
        }
        .section-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .section-row .text {
            flex: 1;
            min-width: 260px;
        }
        .section-row .side-image {
            width: 260px;
            max-width: 100%;
        }
        .section-row .side-image img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        input {
            padding: 8px;
            margin-right: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            border: none;
            background: #8994e5;
            color: #ffffff;
            border-radius: 4px;
            cursor: pointer;
        }
        footer {
            padding: 24px 28px;
            background: #8994e5;
            color:#ffffff;
            font-size: 0.95rem;
        }
    </style>
</head> 
<body>
    <div class="page">
        <div class="container">
            <header class="hero">
                <h1>My exercises</h1>
                <h2>JavaScript</h2>
                <img src="Grace on rainbow.jpg" alt="Grace on rainbow" style="width: 300px; height: auto;"><br>
            </header>
            <main class="content">
                <section class="section">
                    <div class="section-row">
                        <div class="text">
                            <h3>Mixing colours</h3>
                            <p>Insert the hex code without # and click on 'Mix'.</p>
                            <input id="c1" type="text" placeholder="Colour 1 (e.g., FF0000)">
                            <input id="c2" type="text" placeholder="Colour 2 (e.g., 00FF00)">
                            <button id="mixButton">Mix</button>
                            <div id="result" style="margin-top:20px;"></div>
                        </div>
                        <div class="side-image">
                            <img src="hex palette.jpg" alt="Hex palette" style="width: auto; height: auto;">
                        </div>
                    </div>
                </section>
            </main>
            <footer>
                <a href="my-exercises.html" style="color: #024783; text-decoration: underline;">Back to My Exercises</a>
            </footer>
        </div>
    </div>
    <script>
        function mix(hex1, hex2) {
            const c1 = parseInt(hex1, 16);
            const c2 = parseInt(hex2, 16);
            const r = ((c1 >> 16) + (c2 >> 16)) >> 1;
            const g = (((c1 >> 8) & 0xFF) + ((c2 >> 8) & 0xFF)) >> 1;
            const b = ((c1 & 0xFF) + (c2 & 0xFF)) >> 1;
            return (
                "#" +
                r.toString(16).padStart(2, "0") +
                g.toString(16).padStart(2, "0") +
                b.toString(16).padStart(2, "0")
            );
        }
        function showMix() {
            const hex1 = document.getElementById("c1").value.trim();
            const hex2 = document.getElementById("c2").value.trim();
            const result = mix(hex1, hex2);
            document.getElementById("result").innerHTML = `
                <p>Resulting colour: <strong>${result}</strong></p>
                <div style="width:100px; height:50px; background:${result}; border:1px solid #000;"></div>
            `;
        }
        document.getElementById("mixButton").addEventListener("click", showMix);
    </script>
</body>
</html>
